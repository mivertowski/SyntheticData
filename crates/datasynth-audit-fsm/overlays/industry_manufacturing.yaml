# Industry overlay: Manufacturing
# Calibrated for capital-intensive manufacturing audits.
# Characteristics: longer procedures for fixed asset/inventory testing,
# higher evidence volumes, moderate revision rates.
transitions:
  defaults:
    revision_probability: 0.20
    timing:
      mu_hours: 32.0
      sigma_hours: 10.0
artifacts:
  workpapers_per_step:
    min: 2
    max: 4
  evidence_items_per_workpaper:
    min: 3
    max: 6
iteration_limits:
  default: 50
anomalies:
  skipped_approval: 0.02
  late_posting: 0.04
  max_delay_hours: 60.0
  missing_evidence: 0.025
  out_of_sequence: 0.01
resource_costs:
  cost_multiplier: 1.2
  role_hourly_rates:
    engagement_partner: 500
    audit_manager: 300
    audit_senior: 200
    audit_staff: 120
    cae: 400
    audit_director: 350
    senior_auditor: 200
    staff_auditor: 120
