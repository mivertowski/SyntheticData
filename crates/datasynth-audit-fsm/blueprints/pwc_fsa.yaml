schema_version: "1.0"
depth: standard

methodology:
  name: "PwC Aura Financial Statement Audit"
  version: "2025.1"
  framework: "ISA"
  description: >
    An ISA-based financial statement audit methodology styled after PwC Aura
    workflow with Halo analytics integration. This is synthetic, ISA-derived
    content and contains no proprietary PwC methodology. Suitable for
    generating realistic Big 4 style audit engagement data with judgment-level
    annotations.

discriminators:
  tiers:
    - core

actors:
  - id: engagement_leader
    name: "Engagement Leader"
    responsibilities:
      - Overall engagement quality and direction
      - Signing the audit report
  - id: engagement_manager
    name: "Engagement Manager"
    responsibilities:
      - Day-to-day engagement management
      - Multi-level workpaper review
  - id: senior_associate
    name: "Senior Associate"
    responsibilities:
      - Executing audit procedures
      - Preparing workpapers and analytics
  - id: associate
    name: "Associate"
    responsibilities:
      - Performing detailed testing
      - Documenting results

standards_catalog:
  - ref: "ISA 200"
    title: "Overall Objectives of the Independent Auditor"
    binding: requirement
  - ref: "ISA 210"
    title: "Agreeing the Terms of Audit Engagements"
    binding: requirement
  - ref: "ISA 220"
    title: "Quality Management for an Audit of Financial Statements"
    binding: requirement
  - ref: "ISA 240"
    title: "The Auditor's Responsibilities Relating to Fraud"
    binding: requirement
  - ref: "ISA 300"
    title: "Planning an Audit of Financial Statements"
    binding: requirement
  - ref: "ISA 315"
    title: "Identifying and Assessing the Risks of Material Misstatement"
    binding: requirement
  - ref: "ISA 320"
    title: "Materiality in Planning and Performing an Audit"
    binding: requirement
  - ref: "ISA 330"
    title: "The Auditor's Responses to Assessed Risks"
    binding: requirement
  - ref: "ISA 500"
    title: "Audit Evidence"
    binding: requirement
  - ref: "ISA 520"
    title: "Analytical Procedures"
    binding: requirement
  - ref: "ISA 530"
    title: "Audit Sampling"
    binding: requirement
  - ref: "ISA 560"
    title: "Subsequent Events"
    binding: requirement
  - ref: "ISA 570"
    title: "Going Concern"
    binding: requirement
  - ref: "ISA 700"
    title: "Forming an Opinion and Reporting on Financial Statements"
    binding: requirement

evidence_catalog:
  - id: engagement_letter
    name: "Engagement Letter"
    type: document
    lifecycle: [draft, finalized]
  - id: overall_audit_strategy
    name: "Overall Audit Strategy"
    type: document
    lifecycle: [draft, under_review, finalized]
  - id: materiality_workpaper
    name: "Materiality Workpaper"
    type: workpaper
    lifecycle: [draft, under_review, finalized]
  - id: risk_assessment_summary
    name: "Risk Assessment Summary"
    type: assessment
    lifecycle: [draft, under_review, finalized]
  - id: controls_test_results
    name: "Controls Test Results"
    type: workpaper
    lifecycle: [draft, under_review, finalized]
  - id: substantive_test_results
    name: "Substantive Test Results"
    type: workpaper
    lifecycle: [draft, under_review, finalized]
  - id: analytical_procedures_memo
    name: "Analytical Procedures Memorandum"
    type: memo
    lifecycle: [draft, finalized]
  - id: going_concern_assessment
    name: "Going Concern Assessment"
    type: assessment
    lifecycle: [draft, under_review, finalized]
  - id: subsequent_events_memo
    name: "Subsequent Events Memorandum"
    type: memo
    lifecycle: [draft, finalized]
  - id: audit_opinion
    name: "Audit Opinion"
    type: report
    lifecycle: [draft, under_review, finalized]

phases:
  - id: engagement_acceptance
    name: "Engagement Acceptance"
    order: 1
    description: >
      Evaluate whether to accept or continue the engagement, considering
      independence, ethical requirements, and firm policies.
    gate:
      all_of:
        - procedure: accept_engagement
          state: completed

  - id: preliminary_activities
    name: "Preliminary Activities"
    order: 2
    description: >
      Agree engagement terms and establish the overall audit strategy
      including materiality determination.
    gate:
      all_of:
        - procedure: establish_engagement_terms
          state: completed

  - id: risk_assessment
    name: "Risk Assessment"
    order: 3
    description: >
      Understand the entity and its environment, and identify and assess
      the risks of material misstatement.
    gate:
      all_of:
        - procedure: understand_entity_and_environment
          state: completed

  - id: audit_strategy
    name: "Audit Strategy"
    order: 4
    description: >
      Design overall and detailed audit responses to the assessed risks,
      including controls testing strategy.
    gate:
      all_of:
        - procedure: evaluate_design_of_controls
          state: completed

  - id: execution
    name: "Execution"
    order: 5
    description: >
      Execute substantive tests of details and Halo-powered analytical
      procedures to obtain sufficient appropriate audit evidence.
    gate:
      all_of:
        - procedure: perform_tests_of_details_procedure
          state: completed
        - procedure: halo_analytical_procedures
          state: completed

  - id: completion
    name: "Completion"
    order: 6
    description: >
      Address going concern assessment, subsequent events review, and
      evaluate the overall sufficiency of audit evidence.
    gate:
      all_of:
        - procedure: assess_going_concern
          state: completed
        - procedure: evaluate_subsequent_events
          state: completed

  - id: reporting
    name: "Reporting"
    order: 7
    description: >
      Form and issue the audit opinion with Aura workflow sign-off
      and multi-level review.
    gate:
      all_of:
        - procedure: form_and_issue_opinion
          state: completed

procedures:
  # ---- ENGAGEMENT ACCEPTANCE PHASE ----

  - id: accept_engagement
    phase: engagement_acceptance
    title: "Accept or Continue Engagement"
    base_hours: 4.0
    required_roles: [engagement_leader]
    discriminators:
      tiers: [core]
    aggregate:
      initial_state: not_started
      states: [not_started, in_progress, under_review, completed]
      transitions:
        - from_state: not_started
          to_state: in_progress
          command: start_acceptance
          emits: AcceptanceStarted
        - from_state: in_progress
          to_state: under_review
          command: submit_acceptance
          emits: AcceptanceSubmitted
          guards: [all_steps_complete]
        - from_state: under_review
          to_state: completed
          command: approve_acceptance
          emits: AcceptanceApproved
          guards: [partner_approved]
    steps:
      - id: pwc_accept_1
        order: 1
        action: evaluate
        actor: engagement_leader
        description: >
          Evaluate whether to accept or continue the client relationship
          and the specific audit engagement, considering independence,
          ethical requirements, and the firm's risk management policies.
        binding: requirement
        command: evaluate_client_acceptance
        emits: ClientAcceptanceEvaluated
        judgment_level: human_required
        ai_capabilities:
          - independence_screening
          - conflict_of_interest_check
        human_responsibilities:
          - Exercise professional judgment on client acceptance
          - Assess ethical and independence threats
        standards:
          - ref: "ISA 220"
            paragraphs: ["12", "13"]
            binding: requirement
    preconditions: []
    knowledge_refs: []

  # ---- PRELIMINARY ACTIVITIES PHASE ----

  - id: establish_engagement_terms
    phase: preliminary_activities
    title: "Establish Engagement Terms"
    base_hours: 5.0
    required_roles: [engagement_leader]
    discriminators:
      tiers: [core]
    aggregate:
      initial_state: not_started
      states: [not_started, in_progress, under_review, completed]
      transitions:
        - from_state: not_started
          to_state: in_progress
          command: start_engagement_terms
          emits: EngagementTermsStarted
        - from_state: in_progress
          to_state: under_review
          command: submit_engagement_terms
          emits: EngagementTermsSubmitted
          guards: [all_steps_complete]
        - from_state: under_review
          to_state: completed
          command: approve_engagement_terms
          emits: EngagementTermsApproved
          guards: [partner_approved]
    steps:
      - id: pwc_terms_1
        order: 1
        action: agree
        actor: engagement_leader
        description: >
          Agree the terms of the audit engagement with management and
          obtain a signed engagement letter establishing the scope,
          responsibilities, and reporting framework.
        binding: requirement
        command: agree_engagement_terms
        emits: EngagementTermsAgreed
        judgment_level: human_required
        ai_capabilities:
          - engagement_letter_drafting
          - scope_comparison_to_prior_year
        human_responsibilities:
          - Negotiate and agree engagement terms
          - Approve final engagement letter
        evidence:
          inputs: []
          outputs:
            - ref: engagement_letter
              type: document
        standards:
          - ref: "ISA 210"
            paragraphs: ["9", "10"]
            binding: requirement
      - id: pwc_terms_2
        order: 2
        action: determine
        actor: engagement_manager
        description: >
          Determine overall materiality for the financial statements,
          performance materiality, and the clearly trivial threshold,
          using appropriate benchmarks.
        binding: requirement
        command: determine_overall_materiality
        emits: MaterialityDetermined
        judgment_level: human_required
        ai_capabilities:
          - benchmark_computation
          - industry_comparison
          - materiality_sensitivity_analysis
        human_responsibilities:
          - Select appropriate benchmark and percentage
          - Apply professional judgment on materiality level
        guards:
          - type: field_required
            fields: [materiality_amount, benchmark, percentage]
        evidence:
          inputs: []
          outputs:
            - ref: materiality_workpaper
              type: workpaper
        standards:
          - ref: "ISA 320"
            paragraphs: ["10", "11"]
            binding: requirement
    preconditions:
      - accept_engagement
    knowledge_refs: []

  # ---- RISK ASSESSMENT PHASE ----

  - id: understand_entity_and_environment
    phase: risk_assessment
    title: "Understand Entity and Environment"
    base_hours: 16.0
    required_roles: [senior_associate]
    discriminators:
      tiers: [core]
    aggregate:
      initial_state: not_started
      states: [not_started, in_progress, under_review, completed]
      transitions:
        - from_state: not_started
          to_state: in_progress
          command: start_risk_assessment
          emits: RiskAssessmentStarted
        - from_state: in_progress
          to_state: under_review
          command: submit_risk_assessment
          emits: RiskAssessmentSubmitted
          guards: [all_steps_complete]
        - from_state: under_review
          to_state: completed
          command: approve_risk_assessment
          emits: RiskAssessmentApproved
          guards: [reviewer_approved]
    steps:
      - id: pwc_risk_1
        order: 1
        action: understand
        actor: senior_associate
        description: >
          Obtain an understanding of the entity and its environment,
          including the industry, regulatory environment, and the
          entity's nature and operations.
        binding: requirement
        command: understand_entity
        emits: EntityUnderstood
        judgment_level: human_required
        ai_capabilities:
          - industry_analysis
          - regulatory_landscape_mapping
          - financial_trend_analysis
        human_responsibilities:
          - Conduct inquiries of management
          - Exercise professional skepticism
        standards:
          - ref: "ISA 315"
            paragraphs: ["19", "20", "21"]
            binding: requirement
      - id: pwc_risk_2
        order: 2
        action: identify
        actor: senior_associate
        description: >
          Identify risks of material misstatement at both the financial
          statement level and the assertion level.
        binding: requirement
        command: identify_risks
        emits: RisksIdentified
        judgment_level: human_required
        ai_capabilities:
          - risk_factor_screening
          - fraud_indicator_analysis
        human_responsibilities:
          - Apply professional judgment to risk identification
          - Assess fraud risk factors per ISA 240
        evidence:
          inputs: []
          outputs:
            - ref: risk_assessment_summary
              type: assessment
        standards:
          - ref: "ISA 315"
            paragraphs: ["26"]
            binding: requirement
      - id: pwc_risk_3
        order: 3
        action: assess
        actor: senior_associate
        description: >
          Assess the identified risks, evaluating inherent risk factors
          and determining which risks are significant risks.
        binding: requirement
        command: assess_risks
        emits: RisksAssessed
        judgment_level: human_required
        ai_capabilities:
          - risk_scoring_computation
          - comparative_risk_analysis
        human_responsibilities:
          - Determine risk significance
          - Apply professional judgment to assessment
        standards:
          - ref: "ISA 315"
            paragraphs: ["28", "29"]
            binding: requirement
        decisions:
          - condition: "Are there significant risks identified?"
            branches:
              - label: "Yes"
                description: "Design specific responses to significant risks"
              - label: "No"
                description: "Proceed with standard risk responses"
    preconditions:
      - establish_engagement_terms
    knowledge_refs: []

  # ---- AUDIT STRATEGY PHASE ----

  - id: evaluate_design_of_controls
    phase: audit_strategy
    title: "Evaluate Design of Controls"
    base_hours: 20.0
    required_roles: [senior_associate]
    discriminators:
      tiers: [core]
    aggregate:
      initial_state: not_started
      states: [not_started, in_progress, under_review, completed]
      transitions:
        - from_state: not_started
          to_state: in_progress
          command: start_controls_testing
          emits: ControlsTestingStarted
        - from_state: in_progress
          to_state: under_review
          command: submit_controls_testing
          emits: ControlsTestingSubmitted
          guards: [all_steps_complete]
        - from_state: under_review
          to_state: completed
          command: approve_controls_testing
          emits: ControlsTestingApproved
          guards: [reviewer_approved]
    steps:
      - id: pwc_ctrl_1
        order: 1
        action: evaluate
        actor: senior_associate
        description: >
          Evaluate the design and implementation of relevant controls,
          including entity-level controls and IT general controls.
        binding: requirement
        command: evaluate_controls
        emits: ControlsEvaluated
        judgment_level: ai_assistable
        ai_capabilities:
          - control_design_assessment
          - it_control_mapping
        human_responsibilities:
          - Conclude on control design effectiveness
        standards:
          - ref: "ISA 315"
            paragraphs: ["26a"]
            binding: requirement
      - id: pwc_ctrl_2
        order: 2
        action: design
        actor: senior_associate
        description: >
          Design tests of controls responsive to the assessed risks,
          determining the nature, timing, and extent of testing.
        binding: requirement
        command: design_controls_tests
        emits: ControlsTestsDesigned
        judgment_level: ai_assistable
        ai_capabilities:
          - test_procedure_suggestion
          - sample_size_calculation
        human_responsibilities:
          - Approve test design and sample approach
        evidence:
          inputs:
            - ref: risk_assessment_summary
              type: assessment
        standards:
          - ref: "ISA 330"
            paragraphs: ["8"]
            binding: requirement
      - id: pwc_ctrl_3
        order: 3
        action: perform
        actor: associate
        description: >
          Perform tests of controls to obtain evidence about operating
          effectiveness throughout the period of reliance.
        binding: requirement
        command: perform_controls_tests
        emits: ControlsTestsPerformed
        judgment_level: data_only
        ai_capabilities:
          - automated_control_testing
          - exception_detection
        human_responsibilities:
          - Investigate identified exceptions
        evidence:
          inputs: []
          outputs:
            - ref: controls_test_results
              type: workpaper
        standards:
          - ref: "ISA 330"
            paragraphs: ["10", "11"]
            binding: requirement
    preconditions:
      - understand_entity_and_environment
    knowledge_refs: []

  # ---- EXECUTION PHASE ----

  - id: perform_tests_of_details_procedure
    phase: execution
    title: "Perform Tests of Details"
    base_hours: 32.0
    required_roles: [senior_associate, associate]
    discriminators:
      tiers: [core]
    aggregate:
      initial_state: not_started
      states: [not_started, in_progress, under_review, completed]
      transitions:
        - from_state: not_started
          to_state: in_progress
          command: start_substantive_testing
          emits: SubstantiveTestingStarted
        - from_state: in_progress
          to_state: under_review
          command: submit_substantive_testing
          emits: SubstantiveTestingSubmitted
          guards: [all_steps_complete]
        - from_state: under_review
          to_state: completed
          command: approve_substantive_testing
          emits: SubstantiveTestingApproved
          guards: [reviewer_approved]
    steps:
      - id: pwc_sub_1
        order: 1
        action: design
        actor: senior_associate
        description: >
          Design substantive procedures responsive to assessed risks,
          determining the mix of tests of details and substantive
          analytical procedures.
        binding: requirement
        command: design_substantive_procedures
        emits: SubstantiveProceduresDesigned
        judgment_level: ai_assistable
        ai_capabilities:
          - procedure_design_recommendation
          - risk_response_optimization
        human_responsibilities:
          - Approve substantive test design
        evidence:
          inputs:
            - ref: risk_assessment_summary
              type: assessment
            - ref: controls_test_results
              type: workpaper
        standards:
          - ref: "ISA 330"
            paragraphs: ["18"]
            binding: requirement
      - id: pwc_sub_2
        order: 2
        action: perform
        actor: associate
        description: >
          Perform tests of details on material transaction classes,
          account balances, and disclosures using appropriate sampling
          methods.
        binding: requirement
        command: perform_tests_of_details
        emits: TestsOfDetailsPerformed
        judgment_level: data_only
        ai_capabilities:
          - automated_vouching
          - sample_selection
          - data_matching
        human_responsibilities:
          - Investigate identified exceptions
          - Evaluate misstatement implications
        evidence:
          inputs: []
          outputs:
            - ref: substantive_test_results
              type: workpaper
        standards:
          - ref: "ISA 500"
            paragraphs: ["6"]
            binding: requirement
          - ref: "ISA 530"
            paragraphs: ["6"]
            binding: requirement
    preconditions:
      - understand_entity_and_environment
    knowledge_refs:
      - evaluate_design_of_controls

  - id: halo_analytical_procedures
    phase: execution
    title: "Halo-Powered Analytical Procedures"
    base_hours: 14.0
    required_roles: [senior_associate]
    discriminators:
      tiers: [core]
    aggregate:
      initial_state: not_started
      states: [not_started, in_progress, under_review, completed]
      transitions:
        - from_state: not_started
          to_state: in_progress
          command: start_analytical_procedures
          emits: AnalyticalProceduresStarted
        - from_state: in_progress
          to_state: under_review
          command: submit_analytical_procedures
          emits: AnalyticalProceduresSubmitted
          guards: [all_steps_complete]
        - from_state: under_review
          to_state: completed
          command: approve_analytical_procedures
          emits: AnalyticalProceduresApproved
          guards: [reviewer_approved]
    steps:
      - id: pwc_anl_1
        order: 1
        action: design
        actor: senior_associate
        description: >
          Design substantive analytical procedures using Halo analytics
          capabilities to develop precise expectations for significant
          financial relationships.
        binding: requirement
        command: design_analytical_procedures
        emits: AnalyticalProceduresDesigned
        judgment_level: ai_assistable
        ai_capabilities:
          - data_driven_expectation_modelling
          - pattern_recognition
          - halo_journal_entry_analysis
        human_responsibilities:
          - Validate analytical model assumptions
          - Approve expectation thresholds
        standards:
          - ref: "ISA 520"
            paragraphs: ["5"]
            binding: requirement
      - id: pwc_anl_2
        order: 2
        action: perform
        actor: senior_associate
        description: >
          Perform analytical procedures and investigate significant
          fluctuations or inconsistencies identified through Halo
          data analytics.
        binding: requirement
        command: perform_analytical_procedures
        emits: AnalyticalProceduresPerformed
        judgment_level: data_only
        ai_capabilities:
          - automated_variance_analysis
          - outlier_detection
          - trend_visualization
        human_responsibilities:
          - Investigate flagged anomalies
          - Conclude on analytical results
        evidence:
          inputs: []
          outputs:
            - ref: analytical_procedures_memo
              type: memo
        standards:
          - ref: "ISA 520"
            paragraphs: ["5", "7"]
            binding: requirement
    preconditions:
      - establish_engagement_terms
    knowledge_refs: []

  # ---- COMPLETION PHASE ----

  - id: assess_going_concern
    phase: completion
    title: "Assess Going Concern"
    base_hours: 8.0
    required_roles: [engagement_manager]
    discriminators:
      tiers: [core]
    aggregate:
      initial_state: not_started
      states: [not_started, in_progress, under_review, completed]
      transitions:
        - from_state: not_started
          to_state: in_progress
          command: start_going_concern
          emits: GoingConcernStarted
        - from_state: in_progress
          to_state: under_review
          command: submit_going_concern
          emits: GoingConcernSubmitted
          guards: [all_steps_complete]
        - from_state: under_review
          to_state: completed
          command: approve_going_concern
          emits: GoingConcernApproved
          guards: [reviewer_approved]
    steps:
      - id: pwc_gc_1
        order: 1
        action: evaluate
        actor: engagement_manager
        description: >
          Evaluate management's assessment of the entity's ability to
          continue as a going concern for at least twelve months from
          the financial statement date.
        binding: requirement
        command: evaluate_management_assessment
        emits: ManagementAssessmentEvaluated
        judgment_level: human_required
        ai_capabilities:
          - financial_ratio_trend_analysis
          - cash_flow_projection_review
        human_responsibilities:
          - Exercise professional skepticism
          - Consider contradictory evidence
        standards:
          - ref: "ISA 570"
            paragraphs: ["12"]
            binding: requirement
      - id: pwc_gc_2
        order: 2
        action: determine
        actor: engagement_manager
        description: >
          Determine whether material uncertainty related to going concern
          exists, considering all available evidence and management's plans.
        binding: requirement
        command: determine_going_concern_doubt
        emits: GoingConcernDoubtDetermined
        judgment_level: human_required
        ai_capabilities:
          - indicator_screening
        human_responsibilities:
          - Conclude on material uncertainty existence
        evidence:
          inputs: []
          outputs:
            - ref: going_concern_assessment
              type: assessment
        decisions:
          - condition: "Does material uncertainty exist?"
            branches:
              - label: "Yes"
                description: "Evaluate disclosure adequacy and report impact"
                next_step: pwc_gc_3
              - label: "No"
                description: "Document conclusion and proceed"
      - id: pwc_gc_3
        order: 3
        action: evaluate
        actor: engagement_leader
        description: >
          If material uncertainty exists, evaluate the adequacy of
          financial statement disclosures and determine the impact
          on the auditor's report.
        binding: requirement
        command: evaluate_gc_disclosures
        emits: GoingConcernDisclosuresEvaluated
        judgment_level: human_required
        ai_capabilities:
          - disclosure_analysis
        human_responsibilities:
          - Determine report impact
        standards:
          - ref: "ISA 570"
            paragraphs: ["18", "19"]
            binding: requirement
    preconditions:
      - perform_tests_of_details_procedure
    knowledge_refs: []

  - id: evaluate_subsequent_events
    phase: completion
    title: "Evaluate Subsequent Events"
    base_hours: 6.0
    required_roles: [senior_associate]
    discriminators:
      tiers: [core]
    aggregate:
      initial_state: not_started
      states: [not_started, in_progress, under_review, completed]
      transitions:
        - from_state: not_started
          to_state: in_progress
          command: start_subsequent_events
          emits: SubsequentEventsStarted
        - from_state: in_progress
          to_state: under_review
          command: submit_subsequent_events
          emits: SubsequentEventsSubmitted
          guards: [all_steps_complete]
        - from_state: under_review
          to_state: completed
          command: approve_subsequent_events
          emits: SubsequentEventsApproved
          guards: [reviewer_approved]
    steps:
      - id: pwc_se_1
        order: 1
        action: perform
        actor: senior_associate
        description: >
          Perform procedures to identify events between the financial
          statement date and the auditor's report date requiring
          adjustment or disclosure.
        binding: requirement
        command: perform_subsequent_events_review
        emits: SubsequentEventsReviewed
        judgment_level: ai_assistable
        ai_capabilities:
          - news_and_filing_monitoring
          - board_minutes_analysis
        human_responsibilities:
          - Inquire of management
          - Review board minutes
        evidence:
          inputs: []
          outputs:
            - ref: subsequent_events_memo
              type: memo
        standards:
          - ref: "ISA 560"
            paragraphs: ["6", "7"]
            binding: requirement
      - id: pwc_se_2
        order: 2
        action: evaluate
        actor: engagement_manager
        description: >
          Evaluate identified events and classify as adjusting or
          non-adjusting, ensuring appropriate financial statement
          treatment.
        binding: requirement
        command: evaluate_subsequent_events
        emits: SubsequentEventsEvaluated
        judgment_level: human_required
        ai_capabilities:
          - event_classification_suggestion
        human_responsibilities:
          - Classify subsequent events
          - Evaluate disclosure adequacy
        decisions:
          - condition: "Are adjusting events identified?"
            branches:
              - label: "Yes"
                description: "Ensure financial statements are adjusted"
              - label: "No"
                description: "Evaluate non-adjusting event disclosures"
    preconditions:
      - perform_tests_of_details_procedure
    knowledge_refs: []

  # ---- REPORTING PHASE ----

  - id: form_and_issue_opinion
    phase: reporting
    title: "Form and Issue Audit Opinion"
    base_hours: 14.0
    required_roles: [engagement_leader]
    discriminators:
      tiers: [core]
    aggregate:
      initial_state: not_started
      states: [not_started, in_progress, under_review, completed]
      transitions:
        - from_state: not_started
          to_state: in_progress
          command: start_opinion_formation
          emits: OpinionFormationStarted
        - from_state: in_progress
          to_state: under_review
          command: submit_opinion
          emits: OpinionSubmitted
          guards: [all_steps_complete]
        - from_state: under_review
          to_state: in_progress
          command: revise_opinion
          emits: OpinionRevisionRequested
        - from_state: under_review
          to_state: completed
          command: issue_opinion
          emits: OpinionIssued
          guards: [partner_approved]
    steps:
      - id: pwc_opinion_1
        order: 1
        action: evaluate
        actor: engagement_manager
        description: >
          Evaluate whether sufficient appropriate audit evidence has been
          obtained and assess the aggregate effect of uncorrected
          misstatements.
        binding: requirement
        command: evaluate_evidence_sufficiency
        emits: EvidenceSufficiencyEvaluated
        judgment_level: human_required
        ai_capabilities:
          - misstatement_aggregation
          - evidence_gap_analysis
        human_responsibilities:
          - Conclude on evidence sufficiency
        evidence:
          inputs:
            - ref: substantive_test_results
              type: workpaper
            - ref: going_concern_assessment
              type: assessment
        standards:
          - ref: "ISA 700"
            paragraphs: ["10", "11"]
            binding: requirement
      - id: pwc_opinion_2
        order: 2
        action: determine
        actor: engagement_leader
        description: >
          Form an opinion on whether the financial statements are prepared,
          in all material respects, in accordance with the applicable
          financial reporting framework.
        binding: requirement
        command: form_audit_opinion
        emits: AuditOpinionFormed
        judgment_level: human_required
        ai_capabilities:
          - opinion_type_recommendation
          - reporting_framework_verification
        human_responsibilities:
          - Form the audit opinion
          - Exercise final professional judgment
        evidence:
          inputs: []
          outputs:
            - ref: audit_opinion
              type: report
        standards:
          - ref: "ISA 700"
            paragraphs: ["10", "11"]
            binding: requirement
        decisions:
          - condition: "What type of opinion is appropriate?"
            branches:
              - label: "Unmodified"
                description: "Financial statements fairly presented"
              - label: "Qualified"
                description: "Material but not pervasive misstatements"
              - label: "Adverse"
                description: "Material and pervasive misstatements"
              - label: "Disclaimer"
                description: "Unable to obtain sufficient evidence"
      - id: pwc_opinion_3
        order: 3
        action: review
        actor: engagement_leader
        description: >
          Perform Aura workflow sign-off, conducting a final multi-level
          review of the engagement file and approving the audit report
          for issuance.
        binding: requirement
        command: review_engagement_quality
        emits: EngagementQualityReviewed
        judgment_level: human_required
        ai_capabilities:
          - workpaper_completeness_verification
          - consistency_check
        human_responsibilities:
          - Conduct final engagement review
          - Approve report for issuance
      - id: pwc_opinion_4
        order: 4
        action: issue
        actor: engagement_leader
        description: >
          Issue the auditor's report with the opinion, basis for opinion,
          and any additional reporting requirements.
        binding: requirement
        command: issue_audit_report
        emits: AuditReportIssued
        judgment_level: human_required
        ai_capabilities:
          - report_formatting
        human_responsibilities:
          - Sign the audit report
        standards:
          - ref: "ISA 700"
            paragraphs: ["20", "21", "22"]
            binding: requirement
    preconditions:
      - assess_going_concern
      - evaluate_subsequent_events
    knowledge_refs:
      - halo_analytical_procedures
