# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[graph]
targets = []

[advisories]
ignore = [
    # paste: unmaintained but widely used, no drop-in replacement
    "RUSTSEC-2024-0436",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OpenSSL",
    "BSL-1.0",
    "MPL-2.0",
    "CC0-1.0",
    "0BSD",
    "CDLA-Permissive-2.0",
    "bzip2-1.0.6",
]
confidence-threshold = 0.8

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = [
    "https://github.com/rust-lang/crates.io-index",
    "https://index.crates.io",
]
allow-git = []
