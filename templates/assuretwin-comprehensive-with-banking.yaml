# AssureTwin Comprehensive Demo Configuration - With Banking/AML
# Purpose: Generate full-featured synthetic data for AssureTwin platform demos
#          including KYC/AML banking data for financial crime detection
# Use case: Fraud detection, process mining, audit analytics, ML training, AML compliance
#
# Features enabled:
# - All features from assuretwin-comprehensive.yaml
# - Plus: Banking customers, accounts, transactions
# - Plus: KYC profiles and AML typology labels
# - Plus: Suspicious activity patterns (structuring, layering, mule networks)

global:
  industry: manufacturing
  start_date: "2024-01-01"
  period_months: 12
  seed: 20240101
  group_currency: USD
  parallel: true
  worker_threads: 8
  memory_limit_mb: 8192

companies:
  - code: "1000"
    name: "AssureTwin Corp HQ"
    currency: USD
    country: US
    annual_transaction_volume: hundred_k
    volume_weight: 0.5
    fiscal_year_variant: K4
  - code: "2000"
    name: "AssureTwin Corp EU"
    currency: EUR
    country: DE
    annual_transaction_volume: hundred_k
    volume_weight: 0.3
    fiscal_year_variant: K4
  - code: "3000"
    name: "AssureTwin Corp APAC"
    currency: CNY
    country: CN
    annual_transaction_volume: hundred_k
    volume_weight: 0.2
    fiscal_year_variant: K4

chart_of_accounts:
  complexity: large
  industry_specific: true
  min_hierarchy_depth: 3
  max_hierarchy_depth: 6

master_data:
  vendors:
    count: 500
    intercompany_percent: 0.20
  customers:
    count: 1000
    intercompany_percent: 0.15
  materials:
    count: 2000
    bom_enabled: true
    average_bom_depth: 3
  fixed_assets:
    count: 200
  employees:
    count: 200

document_flows:
  p2p:
    enabled: true
    chains_per_month: 2500
    three_way_match_rate: 0.90
    partial_delivery_rate: 0.15
    gr_ir_clearing_enabled: true
  o2c:
    enabled: true
    chains_per_month: 3500
    credit_check_failure_rate: 0.05
    partial_shipment_rate: 0.12
    return_rate: 0.03

ocpm:
  enabled: true
  generate_lifecycle_events: true
  include_object_relationships: true
  compute_variants: true

fraud:
  enabled: true
  fraud_rate: 0.02
  fraud_type_distribution:
    duplicate_payment: 0.15
    fictitious_transaction: 0.15
    suspense_account_abuse: 0.15
    revenue_manipulation: 0.15
    timing_anomaly: 0.10
    split_transaction: 0.10
    expense_capitalization: 0.10
    unauthorized_access: 0.10
  clustering_enabled: true
  clustering_factor: 0.3
  approval_thresholds:
    - 1000.0
    - 5000.0
    - 25000.0
    - 100000.0

anomaly_injection:
  enabled: true
  rates:
    total_rate: 0.02
    fraud_rate: 0.01
    error_rate: 0.005
    process_rate: 0.005
  multi_stage_schemes:
    enabled: true
  correlated_injection:
    enabled: true
  near_miss:
    enabled: true
    proportion: 0.30
  difficulty_classification:
    enabled: true
  context_aware:
    enabled: true
  labeling:
    generate_difficulty_labels: true
    generate_scheme_labels: true

internal_controls:
  enabled: true
  coso_enabled: true
  include_entity_level_controls: true
  target_maturity_level: managed
  exception_rate: 0.02
  sod_violation_rate: 0.01
  export_control_master_data: true
  sox_materiality_threshold: 10000.0

business_processes:
  o2c_weight: 0.30
  p2p_weight: 0.35
  r2r_weight: 0.15
  h2r_weight: 0.10
  a2r_weight: 0.10

temporal:
  enabled: true
  amount_mean_drift: 0.02
  amount_variance_drift: 0.01
  anomaly_rate_drift: 0.001
  concept_drift_rate: 0.05
  sudden_drift_probability: 0.05

accounting_standards:
  enabled: true
  framework: us_gaap
  revenue_recognition:
    enabled: true
  leases:
    enabled: true
  fair_value:
    enabled: true
  impairment:
    enabled: true

audit_standards:
  enabled: true
  isa_compliance:
    enabled: true
    framework: dual
  generate_audit_trail: true
  sox:
    enabled: true
  pcaob:
    enabled: true

vendor_network:
  enabled: true
  depth: 3

customer_segmentation:
  enabled: true

relationship_strength:
  enabled: true

cross_process_links:
  enabled: true
  inventory_p2p_o2c: true
  payment_bank_reconciliation: true
  intercompany_bilateral: true

balance:
  generate_opening_balances: true
  generate_trial_balances: true
  reconcile_subledgers: true

graph_export:
  enabled: true
  train_ratio: 0.70
  validation_ratio: 0.15

intercompany:
  enabled: true
  ic_transaction_rate: 0.15
  generate_matched_pairs: true
  generate_eliminations: true

# Banking/AML Configuration - Additional feature for this variant
# Uses default population sizes and typology rates
# Default provides: 10,000 retail, 2,000 business, 500 trust customers
# Default suspicious rate: ~3% with various AML typologies
banking:
  enabled: true

scenario:
  tags:
    - assuretwin
    - comprehensive
    - fraud_detection
    - process_mining
    - audit
    - ocel_2_0
    - ml_training
    - banking
    - aml
    - kyc
  profile: clean
  description: "AssureTwin comprehensive demo with banking/AML features - fraud detection, process mining, audit analytics, KYC/AML"
  ml_training: true
  target_anomaly_ratio: 0.02

output:
  output_directory: ./output/assuretwin_comprehensive_banking
  formats:
    - csv
    - json
    - parquet
  compression:
    enabled: true
    level: 6
  batch_size: 10000
  include_acdoca: true
  partition_by_period: true
  partition_by_company: true

data_quality:
  enabled: false
